<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
</head>


    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body{
            height: 200vh;
        }

        header{
            background-color: #222;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }

        #menu ul{
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        #menu a{
            text-decoration: none;
            color: #fff;
            font-size: 1.2rem;
        }

        .hamburguer{
            width: 40px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
            display: none;
        }

        .hamburguer span{
            width: 100%;
            height: 4px;
            background-color: #fff;
        }


        @media(max-width: 768px) {
            .hamburguer{
                display: flex;
            }

            #menu{
                position: absolute;
                top: 70px;
                left: 0px;
                background-color: #222;
                width: 100%;
                padding: 0rem 2rem;
                max-height: 0px;
                transition: 1s ease;
                overflow: hidden;
            }

            #menu.ativo{
                max-height: 300px;
                padding: 1rem 2rem;
            }

            #menu ul{
                flex-direction: column;
                gap: 2rem;
            }
        }
    </style>
<body>

    <header>
        <h2>LOGOTIPO</h2>
        <div class="hamburguer" id="btnmenu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav id="menu">
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Serviços</a></li>
                <li><a href="">Contato</a></li>
                <li><a href="">Portifólio</a></li>
                <li><a href="">Login</a></li>
            </ul>
        </nav>
    </header>


    <script>
        let btn_menu = document.getElementById("btnmenu")
        let menu = document.getElementById('menu')

        btn_menu.addEventListener('click', ()=>{
            console.log("Usuario clicou no btn menu")
            menu.classList.toggle('ativo')
        })

        window.addEventListener("scroll", () => {
            menu.classList.remove('ativo')
        })


    </script>



</body>

</html>
